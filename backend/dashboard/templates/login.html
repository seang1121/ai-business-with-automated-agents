<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Agent Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('dashboard.static', filename='dashboard.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>Agent Dashboard</h1>
    <p>Enter your PIN to access the dashboard.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash error">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('dashboard.login') }}">
      <input type="password" name="pin" placeholder="Enter PIN" maxlength="10" required autofocus>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p class="login-hint">Default PIN: 123456 (change in .env)</p>
  </div>
</body>
</html>
