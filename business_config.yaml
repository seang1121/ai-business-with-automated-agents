# =============================================================
# AI Business with Automated Agents — Configuration
# =============================================================
# This is the ONLY file you need to edit to configure for YOUR business.
# Change the values below, then run: python backend/app.py
#
# Works for ANY business type: pressure washing, law firm, dentist,
# landscaping, auto detailing, restaurant, real estate — anything.
# =============================================================

# --- YOUR BUSINESS INFO ---
business:
  name: "Example Pressure Washing Co."
  type: "pressure_washing"            # e.g. law_firm, dental, landscaping, restaurant, real_estate
  owner_name: "John Smith"
  phone: "(555) 000-0000"
  email: "info@yourbusiness.com"
  website: "https://yourbusiness.com"
  tagline: "Professional pressure washing for homes and businesses"

  # Where you operate (agents reference this for context)
  service_area:
    regions:
      - "Nassau County, NY"
      - "Suffolk County, NY"
    towns:
      - "Huntington"
      - "Babylon"
      - "Smithtown"
      - "Massapequa"
      - "Farmingdale"

  # Your services (agents use these for estimates, follow-ups, invoices)
  services:
    - name: "Driveway & Walkway Cleaning"
      category: "residential"
      starting_price: 150
      unit: "per job"
      estimate_factors: ["square_footage", "stain_severity"]

    - name: "House & Vinyl Siding Wash"
      category: "residential"
      starting_price: 300
      unit: "per job"
      estimate_factors: ["stories", "square_footage"]

    - name: "Deck & Patio Cleaning"
      category: "residential"
      starting_price: 175
      unit: "per job"
      estimate_factors: ["square_footage", "material"]

    - name: "Roof Soft Washing"
      category: "residential"
      starting_price: 350
      unit: "per job"
      estimate_factors: ["square_footage", "pitch"]

    - name: "Commercial Exterior"
      category: "commercial"
      starting_price: null             # "Call for pricing"
      unit: "quote"
      estimate_factors: []

  # Business hours (scheduling agent uses this)
  hours:
    monday:    { start: "07:00", end: "19:00" }
    tuesday:   { start: "07:00", end: "19:00" }
    wednesday: { start: "07:00", end: "19:00" }
    thursday:  { start: "07:00", end: "19:00" }
    friday:    { start: "07:00", end: "19:00" }
    saturday:  { start: "08:00", end: "17:00" }
    sunday: null                       # Closed

  # How long each job slot lasts
  slot_duration_minutes: 60

  # Google review link (reviews agent includes this)
  google_review_link: "https://g.page/r/YOUR_REVIEW_LINK/review"


