# --- AGENT SETTINGS ---
agents:
  leads:
    enabled: true
    response_tone: "friendly and professional"
    max_response_delay_minutes: 5

  scheduling:
    enabled: true
    slots_to_suggest: 3
    buffer_between_jobs_minutes: 30

  reviews:
    enabled: true
    delay_after_completion_hours: 2
    review_platform: "google"

  finance:
    enabled: true
    invoice_prefix: "INV"
    payment_methods:
      - "Cash"
      - "Venmo"
      - "Check"
      - "Credit Card"
    tax_rate: 0.08625                  # NY sales tax — change for your state

  marketing:
    enabled: true
    platforms: ["facebook", "instagram"]
    hashtags: ["#localbusiness", "#beforeandafter"]

  estimating:
    enabled: true
    size_multipliers:
      small: 1.0
      medium: 1.5
      large: 2.2
      xlarge: 3.0


# --- MODE ---
# "demo" = runs without API keys (mock responses, no real messages sent)
# "live" = requires ANTHROPIC_API_KEY and TWILIO credentials in .env
mode: "demo"


# --- NOTIFICATIONS ---
notifications:
  method: "dashboard_only"            # "sms", "email", or "dashboard_only"
  owner_phone: "+15550000000"
  owner_email: "owner@yourbusiness.com"


# --- INTEGRATIONS ---
integrations:
  openclaw:
    enabled: false                     # Set true if you have OpenClaw running
    gateway_url: "ws://127.0.0.1:18789"
    features:
      - approval_relay                 # OpenClaw presents drafts conversationally
      - proactive_monitoring           # Alerts owner about stale leads
      - browser_testing                # Verifies website is working
